<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Travel OS</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="app">

  <aside class="panel">
    <h2>Travel OS</h2>

    <label>Budget</label>
    <input type="range" id="budget" min="2000" max="12000" step="500">
    <div id="budgetValue" class="value-display"></div>

    <label>Vertrekmaand</label>
    <select id="month">
      <option value="1">Januari</option>
      <option value="2">Februari</option>
      <option value="3">Maart</option>
      <option value="4">April</option>
      <option value="5">Mei</option>
      <option value="6">Juni</option>
      <option value="7">Juli</option>
      <option value="8">Augustus</option>
      <option value="9">September</option>
      <option value="10">Oktober</option>
      <option value="11">November</option>
      <option value="12">December</option>
    </select>

    <button id="generate">Genereer plan</button>

    <h3>Geplande reizen</h3>
    <div id="timeline"></div>
  </aside>

  <main>
    <section id="map"></section>
  </main>

</div>

<script type="module" src="./js/app.js"></script>

</body>
</html>
