<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Travel OS</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="app">

  <aside class="panel">
    <h2>Travel OS</h2>
    <p class="panel-sub">Persoonlijke reisoptimalisatie</p>

    <div class="section-label">Jaar</div>
    <div class="year-buttons">
      <button class="year-btn" data-year="2026">2026</button>
      <button class="year-btn" data-year="2027">2027</button>
      <button class="year-btn" data-year="2028">2028</button>
    </div>

    <div class="budget-block">
      <div id="budgetRange" class="budget-range"></div>
      <div id="budgetTarget" class="budget-target"></div>
    </div>

    <div class="class-legend">
      <div class="section-label">Klassen</div>
      <div class="legend-row"><span class="dot class-dot-1"></span> Class 1 — High Value</div>
      <div class="legend-row"><span class="dot class-dot-2"></span> Class 2 — Mid Premium</div>
      <div class="legend-row"><span class="dot class-dot-3"></span> Class 3 — Bucket List</div>
    </div>

    <div class="map-legend">
      <div class="legend-row"><span class="dot green"></span> In beste plan</div>
      <div class="legend-row"><span class="dot amber"></span> In alternatief</div>
    </div>

    <button id="generate">Genereer plannen</button>
  </aside>

  <main>
    <section id="map"></section>
    <section id="timeline"></section>
  </main>

</div>

<script type="module" src="./js/app.js"></script>

</body>
</html>
